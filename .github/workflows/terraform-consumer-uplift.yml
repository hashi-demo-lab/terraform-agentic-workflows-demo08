name: "Terraform Consumer Module Uplift"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.tf"
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: consumer-uplift-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

env:
  TFE_TOKEN: ${{ secrets.TFE_TOKEN }}

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: CLASSIFY — Parse git diff, detect semver type
  # ─────────────────────────────────────────────────
  classify:
    name: "Classify Version Bump"
    if: >-
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'dependabot/terraform/') ||
       startsWith(github.head_ref, 'module-update/'))
    runs-on: ubuntu-latest
    outputs:
      version_type: ${{ steps.classify.outputs.version_type }}
      modules_changed: ${{ steps.classify.outputs.modules_changed }}
      module_count: ${{ steps.classify.outputs.module_count }}
      is_dependabot: ${{ steps.classify.outputs.is_dependabot }}
      should_continue: ${{ steps.classify.outputs.should_continue }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify version bump
        id: classify
        run: |
          chmod +x .foundations/scripts/bash/classify-version-bump.sh
          RESULT=$(bash .foundations/scripts/bash/classify-version-bump.sh \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD") || {
            EXIT_CODE=$?
            if [[ $EXIT_CODE -eq 2 ]]; then
              echo "No module version changes detected"
              echo "should_continue=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Classification failed with exit code $EXIT_CODE"
            exit 1
          }

          echo "version_type=$(echo "$RESULT" | jq -r '.version_type')" >> "$GITHUB_OUTPUT"
          echo "modules_changed=$(echo "$RESULT" | jq -c '.modules_changed')" >> "$GITHUB_OUTPUT"
          echo "module_count=$(echo "$RESULT" | jq -r '.module_count')" >> "$GITHUB_OUTPUT"
          echo "is_dependabot=$(echo "$RESULT" | jq -r '.is_dependabot')" >> "$GITHUB_OUTPUT"
          echo "should_continue=true" >> "$GITHUB_OUTPUT"

          # ── Step summary ──
          VERSION_TYPE=$(echo "$RESULT" | jq -r '.version_type')
          MODULE_COUNT=$(echo "$RESULT" | jq -r '.module_count')
          IS_DEPENDABOT=$(echo "$RESULT" | jq -r '.is_dependabot')

          {
            echo "## 1/4 — Classify Version Bump"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version Type | \`${VERSION_TYPE}\` |"
            echo "| Modules Changed | ${MODULE_COUNT} |"
            echo "| Source | $(if [[ "$IS_DEPENDABOT" == "true" ]]; then echo "Dependabot"; else echo "Fallback Scanner / Manual"; fi) |"
            echo ""
            echo "### Modules"
            echo ""
            echo "| Module | Source | Old Version | New Version | Bump |"
            echo "|--------|--------|-------------|-------------|------|"
            echo "$RESULT" | jq -r '.modules_changed[] | "| `\(.module)` | \(.source) | `\(.old_version)` | `\(.new_version)` | `\(.bump_type)` |"'
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────
  # Job 2: VALIDATE — Deterministic Terraform checks
  # ─────────────────────────────────────────────────
  validate:
    name: "Validate Terraform"
    needs: classify
    if: needs.classify.outputs.should_continue == 'true'
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      plan_summary: ${{ steps.plan-summary.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          cli_config_credentials_hostname: app.terraform.io
          cli_config_credentials_token: ${{ secrets.TFE_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: |
          tflint --init
          tflint --format=compact

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          set -o pipefail
          terraform plan -detailed-exitcode -input=false -out=tfplan 2>&1 | tee plan_output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set +o pipefail
          set -e

          echo "exitcode=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"

          case $PLAN_EXIT in
            0)
              {
                echo "## 2/4 — Validate Terraform"
                echo ""
                echo "> **Result**: No changes — workspace already at target version."
                echo ""
                echo "The PR will be auto-closed."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            1)
              {
                echo "## 2/4 — Validate Terraform"
                echo ""
                echo "> **Result**: Plan error — likely breaking changes."
                echo ""
                echo "<details><summary>Error output (last 30 lines)</summary>"
                echo ""
                echo '```hcl'
                tail -30 plan_output.txt
                echo '```'
                echo ""
                echo "</details>"
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              terraform show -no-color tfplan > plan_readable.txt 2>&1 || true

              # Extract resource-level actions for the summary
              ADD_LIST=$(grep -E '# .* will be created' plan_readable.txt 2>/dev/null | sed 's/.*# //' | sed 's/ will be created//' || true)
              CHANGE_LIST=$(grep -E '# .* will be updated' plan_readable.txt 2>/dev/null | sed 's/.*# //' | sed 's/ will be updated in-place//' || true)
              DESTROY_LIST=$(grep -E '# .* will be destroyed' plan_readable.txt 2>/dev/null | sed 's/.*# //' | sed 's/ will be destroyed//' || true)
              REPLACE_LIST=$(grep -E '# .* must be replaced' plan_readable.txt 2>/dev/null | sed 's/.*# //' | sed 's/ must be replaced//' || true)

              {
                echo "## 2/4 — Validate Terraform"
                echo ""
                echo "> **Result**: Changes detected — proceeding to AI analysis."
                echo ""
                echo "| Check | Status |"
                echo "|-------|--------|"
                echo "| \`terraform fmt\` | Passed |"
                echo "| \`terraform validate\` | Passed |"
                echo "| \`tflint\` | Passed |"
                echo "| \`terraform plan\` | Exit 2 (changes) |"
                echo ""

                if [[ -n "$ADD_LIST" || -n "$CHANGE_LIST" || -n "$DESTROY_LIST" || -n "$REPLACE_LIST" ]]; then
                  echo "### Planned Resource Changes"
                  echo ""
                  if [[ -n "$ADD_LIST" ]]; then
                    echo "$ADD_LIST" | while read -r r; do echo "- :white_check_mark: **Create**: \`${r}\`"; done
                  fi
                  if [[ -n "$CHANGE_LIST" ]]; then
                    echo "$CHANGE_LIST" | while read -r r; do echo "- :pencil2: **Update**: \`${r}\`"; done
                  fi
                  if [[ -n "$DESTROY_LIST" ]]; then
                    echo "$DESTROY_LIST" | while read -r r; do echo "- :x: **Destroy**: \`${r}\`"; done
                  fi
                  if [[ -n "$REPLACE_LIST" ]]; then
                    echo "$REPLACE_LIST" | while read -r r; do echo "- :arrows_counterclockwise: **Replace**: \`${r}\`"; done
                  fi
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

          exit 0

      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            plan_output.txt
            plan_readable.txt
          retention-days: 5

      - name: Parse plan summary
        id: plan-summary
        if: steps.plan.outputs.exitcode == '2'
        run: |
          ADD=$(grep -c '# .* will be created' plan_readable.txt 2>/dev/null || true)
          CHANGE=$(grep -c '# .* will be updated' plan_readable.txt 2>/dev/null || true)
          DESTROY=$(grep -c '# .* will be destroyed' plan_readable.txt 2>/dev/null || true)
          REPLACE=$(grep -c '# .* must be replaced' plan_readable.txt 2>/dev/null || true)
          ADD=${ADD:-0}; CHANGE=${CHANGE:-0}; DESTROY=${DESTROY:-0}; REPLACE=${REPLACE:-0}

          SUMMARY=$(jq -n \
            --argjson add "$ADD" \
            --argjson change "$CHANGE" \
            --argjson destroy "$DESTROY" \
            --argjson replace "$REPLACE" \
            '{add: $add, change: $change, destroy: $destroy, replace: $replace, total: ($add + $change + $destroy + $replace)}')

          echo "summary=$(echo "$SUMMARY" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: Handle no-changes (exit 0) — close PR
        if: steps.plan.outputs.exitcode == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### No Changes Detected\n\nThe Terraform plan shows no infrastructure changes for this module version bump. This typically means the workspace already reflects the target version (applied via another path).\n\n**Action**: Closing this PR as no changes are needed.\n\n_If this is unexpected, re-open the PR and investigate._`
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });

      - name: Handle plan error (exit 1) — label breaking
        if: steps.plan.outputs.exitcode == '1'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['breaking-change', 'risk:critical']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan Failed\n\nThe plan command returned an error, indicating this module version bump introduces breaking changes that prevent planning.\n\n**Action**: This PR is blocked. Review the plan output in the workflow logs and use \`@claude\` on this PR for interactive analysis.\n\ncc @claude`
            });

  # ─────────────────────────────────────────────────
  # Job 3: AI ANALYSIS — claude-code-action
  # ─────────────────────────────────────────────────
  ai-analysis:
    name: "AI Analysis"
    needs: [classify, validate]
    if: needs.validate.outputs.plan_exitcode == '2'
    runs-on: ubuntu-latest
    outputs:
      analysis_result: ${{ steps.parse-output.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Run Claude Analysis
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          show_full_output: "true"
          prompt: |
            You are a Terraform module upgrade analyst. Analyze this PR and produce a structured JSON recommendation.

            ## Context
            - **Version type**: ${{ needs.classify.outputs.version_type }}
            - **Modules changed**: ${{ needs.classify.outputs.modules_changed }}
            - **Plan summary**: ${{ needs.validate.outputs.plan_summary }}
            - **PR branch**: ${{ github.head_ref }}
            - **Is Dependabot**: ${{ needs.classify.outputs.is_dependabot }}

            ## Instructions
            Read the agent definition at `.github/agents/module-upgrade-analyst.md` and follow its 5-step analysis process (5A through 5E).

            The plan output is available at `plan_readable.txt` and `plan_output.txt`.

            Your FINAL message must be ONLY a JSON object (no markdown fencing, no commentary) with these fields:
            - decision: "auto-merge" | "needs-review" | "needs-revalidation" | "breaking-change"
            - risk_level: "low" | "medium" | "high" | "critical"
            - version_type: patch/minor/major
            - breaking_changes: []
            - security_findings: []
            - plan_summary: {add, change, destroy, replace, total}
            - adaptations_applied: []
            - interface_diff: {inputs_added, inputs_removed, inputs_changed, outputs_added, outputs_removed, outputs_changed}
            - rationale: string

            Important:
            - If you push code changes (step 5B), set decision to "needs-revalidation"
            - Be conservative: prefer "needs-review" over "auto-merge" when uncertain
            - Never auto-merge major version bumps

      - name: Parse structured output
        id: parse-output
        run: |
          # Read Claude's execution output file (known path from claude-code-action)
          EXEC_FILE="${RUNNER_TEMP}/claude-execution-output.json"
          RESULT=""

          if [[ -f "$EXEC_FILE" ]]; then
            # Extract the last assistant text message containing "decision"
            RESPONSE=$(jq -r '
              [.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // ""
            ' "$EXEC_FILE" 2>/dev/null) || true

            if [[ -n "$RESPONSE" ]]; then
              # Try: response is already valid JSON with decision
              RESULT=$(echo "$RESPONSE" | jq -c 'select(has("decision"))' 2>/dev/null) || true

              # Try: parse as JSON string (escaped JSON)
              if [[ -z "$RESULT" ]]; then
                RESULT=$(echo "$RESPONSE" | jq -rc '. | fromjson | select(has("decision"))' 2>/dev/null) || true
              fi

              # Try: extract JSON from markdown code block
              if [[ -z "$RESULT" ]]; then
                RESULT=$(echo "$RESPONSE" | sed -n '/```json/,/```/{/```/d;p}' | jq -c '.' 2>/dev/null) || true
              fi
            fi
          else
            echo "Warning: Execution file not found at $EXEC_FILE" >&2
          fi

          if [[ -z "$RESULT" ]] || ! echo "$RESULT" | jq empty 2>/dev/null; then
            echo "Warning: Could not parse structured JSON from AI response. Defaulting to needs-review." >&2
            RESULT=$(jq -n \
              --arg vtype "${{ needs.classify.outputs.version_type }}" \
              --argjson plan '${{ needs.validate.outputs.plan_summary }}' \
              '{
                decision: "needs-review",
                risk_level: "medium",
                version_type: $vtype,
                breaking_changes: [],
                security_findings: [],
                plan_summary: $plan,
                adaptations_applied: [],
                interface_diff: {inputs_added:[],inputs_removed:[],inputs_changed:[],outputs_added:[],outputs_removed:[],outputs_changed:[]},
                rationale: "JSON parse failure - defaulting to needs-review for safety"
              }')
          fi

          echo "result=$(echo "$RESULT" | jq -c '.')" >> "$GITHUB_OUTPUT"

          # ── Step summary ──
          DECISION=$(echo "$RESULT" | jq -r '.decision')
          RISK=$(echo "$RESULT" | jq -r '.risk_level')
          BREAKING_COUNT=$(echo "$RESULT" | jq '.breaking_changes | length')
          SECURITY_COUNT=$(echo "$RESULT" | jq '.security_findings | length')
          ADAPTATION_COUNT=$(echo "$RESULT" | jq '.adaptations_applied | length')

          {
            echo "## 3/4 — AI Analysis"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Decision | \`${DECISION}\` |"
            echo "| Risk Level | \`${RISK}\` |"
            echo "| Breaking Changes | ${BREAKING_COUNT} |"
            echo "| Security Findings | ${SECURITY_COUNT} |"
            echo "| Adaptations Applied | ${ADAPTATION_COUNT} |"
            echo ""

            # Interface diff summary
            DIFF=$(echo "$RESULT" | jq '.interface_diff // {}')
            IN_ADD=$(echo "$DIFF" | jq '.inputs_added | length')
            IN_REM=$(echo "$DIFF" | jq '.inputs_removed | length')
            IN_CHG=$(echo "$DIFF" | jq '.inputs_changed | length')
            OUT_ADD=$(echo "$DIFF" | jq '.outputs_added | length')
            OUT_REM=$(echo "$DIFF" | jq '.outputs_removed | length')
            OUT_CHG=$(echo "$DIFF" | jq '.outputs_changed | length')
            TOTAL_DIFF=$((IN_ADD + IN_REM + IN_CHG + OUT_ADD + OUT_REM + OUT_CHG))

            if [[ "$TOTAL_DIFF" -gt 0 ]]; then
              echo "### Interface Diff"
              echo ""
              echo "| Change | Inputs | Outputs |"
              echo "|--------|--------|---------|"
              echo "| Added | ${IN_ADD} | ${OUT_ADD} |"
              echo "| Removed | ${IN_REM} | ${OUT_REM} |"
              echo "| Changed | ${IN_CHG} | ${OUT_CHG} |"
            else
              echo "> Interface: No changes detected between old and new module versions."
            fi
            echo ""

            RATIONALE=$(echo "$RESULT" | jq -r '.rationale // "No rationale provided"')
            echo "### Rationale"
            echo ""
            echo "${RATIONALE}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────
  # Job 4: DECISION — Act on AI recommendation
  # ─────────────────────────────────────────────────
  decision:
    name: "Decision"
    needs: [classify, validate, ai-analysis]
    if: needs.validate.outputs.plan_exitcode == '2'
    runs-on: ubuntu-latest
    steps:
      - name: Parse analysis result
        id: parse
        env:
          ANALYSIS_RESULT: ${{ needs.ai-analysis.outputs.analysis_result }}
          VERSION_TYPE: ${{ needs.classify.outputs.version_type }}
        run: |
          echo "decision=$(echo "$ANALYSIS_RESULT" | jq -r '.decision')" >> "$GITHUB_OUTPUT"
          echo "risk_level=$(echo "$ANALYSIS_RESULT" | jq -r '.risk_level')" >> "$GITHUB_OUTPUT"
          echo "rationale=$(echo "$ANALYSIS_RESULT" | jq -r '.rationale')" >> "$GITHUB_OUTPUT"
          echo "has_adaptations=$(echo "$ANALYSIS_RESULT" | jq '.adaptations_applied | length > 0')" >> "$GITHUB_OUTPUT"
          echo "has_security=$(echo "$ANALYSIS_RESULT" | jq '[.security_findings[] | select(.severity == "high" or .severity == "critical")] | length > 0')" >> "$GITHUB_OUTPUT"

          # ── Step summary ──
          DECISION=$(echo "$ANALYSIS_RESULT" | jq -r '.decision')
          RISK=$(echo "$ANALYSIS_RESULT" | jq -r '.risk_level')

          case "$DECISION" in
            auto-merge)       ICON="white_check_mark"; ACTION="Auto-merging PR" ;;
            needs-review)     ICON="eyes";             ACTION="Requesting human review" ;;
            needs-revalidation) ICON="arrows_counterclockwise"; ACTION="Re-validating after adaptations" ;;
            breaking-change)  ICON="rotating_light";   ACTION="Blocking merge — manual intervention required" ;;
            *)                ICON="question";         ACTION="Unknown decision" ;;
          esac

          {
            echo "## 4/4 — Decision"
            echo ""
            echo ":${ICON}: **${DECISION}** (risk: \`${RISK}\`, version: \`${VERSION_TYPE}\`)"
            echo ""
            echo "**Action**: ${ACTION}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const decision = '${{ steps.parse.outputs.decision }}';
            const riskLevel = '${{ steps.parse.outputs.risk_level }}';
            const versionType = '${{ needs.classify.outputs.version_type }}';

            const labels = [`risk:${riskLevel}`];

            if (decision === 'auto-merge') labels.push('auto-merge');
            else if (decision === 'needs-review') labels.push('needs-review');
            else if (decision === 'needs-revalidation') labels.push('needs-revalidation');
            else if (decision === 'breaking-change') labels.push('breaking-change');

            labels.push(`version:${versionType}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

            // Update PR title with semver tag
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            let prefix = '';
            if (decision === 'breaking-change') prefix = '[BREAKING] ';
            else if (versionType === 'major') prefix = '[MAJOR] ';
            else if (versionType === 'minor') prefix = '[minor] ';
            else prefix = '[patch] ';

            const currentTitle = pr.data.title;
            if (!currentTitle.startsWith('[')) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                title: `${prefix}${currentTitle}`
              });
            }

      - name: Post analysis comment
        uses: actions/github-script@v7
        env:
          ANALYSIS_RESULT: ${{ needs.ai-analysis.outputs.analysis_result }}
          MODULES_CHANGED: ${{ needs.classify.outputs.modules_changed }}
        with:
          script: |
            const result = JSON.parse(process.env.ANALYSIS_RESULT);
            const modulesChanged = JSON.parse(process.env.MODULES_CHANGED);
            const decision = result.decision;
            const risk = result.risk_level;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Decision banner
            const banners = {
              'auto-merge':        { emoji: '✅', label: 'Auto-Merge Approved',   color: '' },
              'needs-review':      { emoji: '👀', label: 'Review Required',       color: '' },
              'needs-revalidation':{ emoji: '🔄', label: 'Re-validation Pending', color: '' },
              'breaking-change':   { emoji: '🚨', label: 'Breaking Change',       color: '' },
            };
            const banner = banners[decision] || { emoji: '❓', label: decision };

            let body = `## ${banner.emoji} Module Upgrade Analysis — ${banner.label}\n\n`;

            // ── Module version table ──
            body += `### Module Versions\n\n`;
            body += `| Module | Old | | New | Bump |\n`;
            body += `|--------|-----|-|-----|------|\n`;
            for (const m of modulesChanged) {
              body += `| \`${m.module}\` | \`${m.old_version}\` | → | \`${m.new_version}\` | \`${m.bump_type}\` |\n`;
            }
            body += `\n`;

            // ── Summary table ──
            body += `### Analysis Summary\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Decision** | \`${decision}\` |\n`;
            body += `| **Risk Level** | \`${risk}\` |\n`;
            body += `| **Version Type** | \`${result.version_type}\` |\n`;

            const plan = result.plan_summary || {};
            const planTotal = (plan.add || 0) + (plan.change || 0) + (plan.destroy || 0) + (plan.replace || 0);
            body += `| **Plan Changes** | \`${planTotal}\` total — `;
            body += `+${plan.add || 0} create, ~${plan.change || 0} update, -${plan.destroy || 0} destroy, ♻${plan.replace || 0} replace |\n\n`;

            // ── Interface diff ──
            const diff = result.interface_diff || {};
            const inAdd  = (diff.inputs_added   || []).length;
            const inRem  = (diff.inputs_removed  || []).length;
            const inChg  = (diff.inputs_changed  || []).length;
            const outAdd = (diff.outputs_added   || []).length;
            const outRem = (diff.outputs_removed || []).length;
            const outChg = (diff.outputs_changed || []).length;
            const totalDiff = inAdd + inRem + inChg + outAdd + outRem + outChg;

            body += `<details><summary><strong>Interface Diff</strong>`;
            if (totalDiff === 0) {
              body += ` — No changes detected</summary>\n\n`;
              body += `The module interface (inputs/outputs) is identical between the old and new versions.\n`;
            } else {
              body += ` — ${totalDiff} change(s)</summary>\n\n`;
              body += `| Change | Inputs | Outputs |\n`;
              body += `|--------|--------|---------|\n`;
              body += `| Added | ${inAdd} | ${outAdd} |\n`;
              body += `| Removed | ${inRem} | ${outRem} |\n`;
              body += `| Changed | ${inChg} | ${outChg} |\n\n`;
              if (inAdd > 0) {
                body += `**New inputs**: ${(diff.inputs_added || []).map(i => `\`${typeof i === 'string' ? i : i.name || JSON.stringify(i)}\``).join(', ')}\n`;
              }
              if (inRem > 0) {
                body += `**Removed inputs**: ${(diff.inputs_removed || []).map(i => `\`${typeof i === 'string' ? i : i.name || JSON.stringify(i)}\``).join(', ')}\n`;
              }
              if (outRem > 0) {
                body += `**Removed outputs**: ${(diff.outputs_removed || []).map(o => `\`${typeof o === 'string' ? o : o.name || JSON.stringify(o)}\``).join(', ')}\n`;
              }
            }
            body += `\n</details>\n\n`;

            // ── Breaking changes ──
            if (result.breaking_changes?.length > 0) {
              body += `### ⚠️ Breaking Changes\n\n`;
              for (const bc of result.breaking_changes) {
                const icon = bc.adapted ? '✅' : '❌';
                const status = bc.adapted ? 'Adapted' : 'Not adapted';
                body += `- ${icon} **${bc.type}**: ${bc.description} — *${status}*`;
                if (bc.adaptation_details) body += `\n  > ${bc.adaptation_details}`;
                body += `\n`;
              }
              body += '\n';
            }

            // ── Security findings ──
            if (result.security_findings?.length > 0) {
              body += `### 🔒 Security Findings\n\n`;
              const severityIcon = { critical: '🔴', high: '🟠', medium: '🟡', low: '🟢' };
              for (const sf of result.security_findings) {
                const sIcon = severityIcon[sf.severity] || '⚪';
                body += `- ${sIcon} **[${sf.severity.toUpperCase()}]** ${sf.category}: ${sf.description}\n`;
              }
              body += '\n';
            }

            // ── Adaptations applied ──
            if (result.adaptations_applied?.length > 0) {
              body += `### 🔧 Adaptations Applied\n\n`;
              for (const a of result.adaptations_applied) {
                body += `- \`${a.file}\`: ${a.change}\n`;
              }
              body += '\n> ⚠️ Code was modified. The pipeline will re-run to validate adaptations.\n\n';
            }

            // ── Rationale ──
            body += `### Rationale\n\n${result.rationale}\n\n`;

            // ── Footer ──
            body += `---\n`;
            body += `📋 [Pipeline run](${runUrl})`;

            if (decision === 'auto-merge') {
              body += ` · ✅ This PR was auto-merged.\n`;
            } else if (decision === 'needs-review' || decision === 'breaking-change') {
              body += `\n\n💬 **Need deeper analysis?** Comment \`@claude\` on this PR for interactive follow-up with full MCP tool access.\n`;
            } else if (decision === 'needs-revalidation') {
              body += ` · 🔄 Waiting for re-validation after code adaptations.\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      # Auto-merge for low-risk patches/minor
      - name: Auto-merge
        if: steps.parse.outputs.decision == 'auto-merge' && steps.parse.outputs.risk_level == 'low'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });

      # Request review for medium+ risk
      - name: Request review
        if: steps.parse.outputs.decision == 'needs-review'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              // Request review from CODEOWNERS
              const { data: reviewers } = await github.rest.repos.getCodeownersErrors({
                owner: context.repo.owner,
                repo: context.repo.repo
              });

              // Fallback: request review from repo admins
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                team_reviewers: ['platform-team']
              });
            } catch (e) {
              console.log('Could not request reviewers:', e.message);
            }

  # ─────────────────────────────────────────────────
  # Interactive: @claude mention on PR
  # ─────────────────────────────────────────────────
  interactive:
    name: "Interactive Analysis (@claude)"
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.issue.pull_request.head.ref || '' }}
          fetch-depth: 0

      - name: Run Claude Interactive
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            You are a Terraform module upgrade analyst responding to a question on a PR.

            The user's comment: ${{ github.event.comment.body }}

            Read the agent definition at `.github/agents/module-upgrade-analyst.md` for your full capabilities.

            You have access to Terraform MCP tools for deep investigation of the private registry modules.
            You can make code changes and push them to this PR branch if needed.

            Respond conversationally with your findings. If you make code changes, note that the pipeline will re-run automatically.
