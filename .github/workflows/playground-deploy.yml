name: Deploy SDD Playground

on:
  push:
    branches: [main]
    paths:
      - '.foundations/design/sdd-workflow-playground.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy
          cp .foundations/design/sdd-workflow-playground.html deploy/index.html

      - name: Pull Vercel project config
        run: npx --yes vercel@50.15.1 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: deploy

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(npx --yes vercel@50.15.1 --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"
        working-directory: deploy

      - name: Reassign tfai.vercel.app alias
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          DEPLOY_HOST=$(echo "$DEPLOY_URL" | sed 's|https://||')
          DEPLOY_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v13/deployments?url=$DEPLOY_HOST&limit=1" \
            | jq -r '.deployments[0].uid')
          echo "Deployment ID: $DEPLOY_ID"

          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"alias": "tfai.vercel.app"}' \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases"
          echo ""
          echo "Alias tfai.vercel.app reassigned successfully"
